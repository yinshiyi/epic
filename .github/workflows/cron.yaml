name: CI Build and Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * 1-6"   # 17:00 UTC = 9:00 PST, Monday to Friday
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        bash install_chrome.sh

    - name: Run tests
      run: |
        python rate4.py > output.log 2>&1
        mv output.log logs/output-$(date +"%Y%m%d-%H%M%S").log

    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Add workflow output log $(date +"%Y-%m-%d %H:%M:%S")"
        branch: workflow-logs
