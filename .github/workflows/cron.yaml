name: CI Build and Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * 1-6"   # 17:00 UTC = 9:00 PST, Monday to Friday
permissions:
  contents: write  # This allows the GITHUB_TOKEN to push changes
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        bash install_chrome.sh

    - name: Run tests
      run: |
        python rate4.py > output.log 2>&1
        mkdir -p logs
        TZ="America/Los_Angeles"
        mv output.log logs/output-$(date +"%Y%m%d-%H%M%S").log
    - name: Set timestamp
      run: |
        TZ="America/Los_Angeles"
        echo "TIMESTAMP=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Add workflow output log ${{ env.TIMESTAMP }}"
        branch: workflow-logs
