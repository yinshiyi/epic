name: CI Build and Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * 1-6"   # 17:00 UTC = 9:00 PST, Monday to Friday
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        bash install_chrome.sh

    - name: Run tests
      run: |
        python rate4.py > output.log 2>&1

    - name: Run tests
      run: |
        python rate4.py > output.log 2>&1

    - name: Commit workflow output
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        mkdir -p logs
        mv output.log logs/output-$(date +%Y%m%d-%H%M%S).log
        git add logs/
        git commit -m "Add workflow output log $(date +%Y-%m-%d\ %H:%M:%S)" || echo "No changes to commit"
        git push